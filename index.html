史类型有助于认识和揭示法律的阶级本质及其发展变化的历史规律。与人类进入阶级社会后的社会形态划分相一致，人类社会存在以下几种类型的法律（     ）。","options":{"A":"社会主义法律","B":"奴隶制法律","C":"封建制法律","D":"资本主义法律"},"answer":"ABCD"},{"id":"m32","type":"multi","question":"以下哪些权利不属于我国公民的财产权利的范围（    ）。","options":{"A":"知识产权","B":"取得劳动报酬的权利","C":"继承遗产的权利","D":"获得社会保障的权利"},"answer":"BD"},{"id":"m33","type":"multi","question":"以下行为属于侵犯公民通信自由权的是（    ）。","options":{"A":"私自拆阅他人通信","B":"公安机关依职权检查公民通信","C":"损毁他人通信","D":"扣押他人通信"},"answer":"ACD"},{"id":"m34","type":"multi","question":"下列属于法律制定程序的是（     ）。","options":{"A":"法律案的提出","B":"法律案的通过","C":"法律适用","D":"法律案的审议"},"answer":"ABD"},{"id":"m35","type":"multi","question":"法律的运行是一个从创制、实施到实现的过程。这个过程主要包括（      ）等环节。","options":{"A":"法律遵守","B":"法律适用","C":"法律执行","D":"法律制定"},"answer":"ABCD"},{"id":"m36","type":"multi","question":"1978年，党的十一届三中全会提出的我国法制建设的16字方针是（        ）。","options":{"A":"有法可依","B":"执法必严","C":"违法必究","D":"有法必依"},"answer":"ABCD"},{"id":"m37","type":"multi","question":"中华人民共和国宪法拥有至高无上的地位，是基于以下原因（         ）。","options":{"A":"从效力上看，我国宪法是国家各项制度和法律法规的总依据","B":"从内容上看，我国宪法规定了国家的根本制度","C":"从作用上看，它是治国安邦的总章程，是党和人民意志的集中体现","D":"从地位上看，我国宪法是国家的根本大法"},"answer":"ABCD"},{"id":"m38","type":"multi","question":"我国刑法的原则有（    ）。","options":{"A":"罪行法定原则","B":"乱世用重典原则","C":"法律面前人人平等","D":"罪刑相适应原则"},"answer":"ACD"},{"id":"m39","type":"multi","question":"走中国特色社会主义法治道路，必须做到（  ）以及坚持从中国实际出发。","options":{"A":"坚持中国共产党的领导","B":"坚持法律面前人人平等","C":"坚持依法治国和以德治国相结合","D":"坚持人民主体地位"},"answer":"ABCD"},{"id":"m40","type":"multi","question":"我国宪法从效力上看，宪法与普通法律关系表现在（    ）。","options":{"A":"宪法是其他一般法律的立法基础","B":"是国家各项制度和法律法规的总依据","C":"法律的制定不得同宪法相抵触，如有抵触，法律即无效","D":"宪法在中国特色社会主义法律体系中居于统帅地位"},"answer":"ABCD"},{"id":"m41","type":"multi","question":"法治思维与人治思维的区别主要表现在（    ）。","options":{"A":"遵循的价值不同","B":"标准不同","C":"依据不同","D":"调节方式不同"},"answer":"ABCD"},{"id":"m42","type":"multi","question":"法治思维的基本内容是（    ）。","options":{"A":"权利保障和正当程序","B":"权力制约","C":"公平正义","D":"法律至上"},"answer":"ABCD"},{"id":"m43","type":"multi","question":"大学生可以通过以下哪些途径培养法治思维方式（     ）。","options":{"A":"参与法律实践","B":"研究犯罪心理","C":"学习法律知识","D":"掌握法律方法"},"answer":"ACD"},{"id":"m44","type":"multi","question":"尊重法律权威是公民法定义务和必备素质,尊重法律权威的基本要求包括（    ）。","options":{"A":"服从法律","B":"遵守法律","C":"维护法律","D":"信仰法律"},"answer":"ABCD"},{"id":"m45","type":"multi","question":"公民应尽的法律义务包括（   ）。","options":{"A":"依法服兵役和依法纳税","B":"维护祖国安全、荣誉和利益","C":"遵守宪法和法律","D":"维护国家统一和民族团结"},"answer":"ABCD"},{"id":"m46","type":"multi","question":"我国宪法确立的制度有（     ）。","options":{"A":"基本经济制度","B":"根本政治制度","C":"国体","D":"基本政治制度"},"answer":"ABCD"},{"id":"m47","type":"multi","question":"下列关于中国特色社会主义法治体系五大体系的说法，正确的是（   ）。","options":{"A":"既有国家层面，也有党的层面","B":"既能实现依法治国，又能实现以德治国","C":"既有理论层面，也有实践层面","D":"既有制度层面，也有运行层面"},"answer":"ACD"},{"id":"m48","type":"multi","question":"“法律面前人人平等”，所以（     ）。","options":{"A":"每个人都既享有法律权利，又应当依法履行法律义务","B":"个人无论是行使权利还是履行义务，都是对自己有益的","C":"没有人能享有超越法律的特权","D":"法律上不允许特殊主体的存在"},"answer":"ABC"},{"id":"m49","type":"multi","question":"我国宪法法律规定的公民权利与义务具有（    ）。","options":{"A":"公平性","B":"强制性","C":"广泛性","D":"真实性"},"answer":"ACD"},{"id":"m50","type":"multi","question":"下列关于我国公民的选举权利与义务的说法，正确的是（     ）。","options":{"A":"每一个中华人民共和国公民都享有选举权和被选举权","B":"选举权和被选举权不可分离","C":"对于不称职的公职人员，选民只能投票决定其任期届满不再继续任职","D":"违法犯罪的人可能被剥夺选举权"},"answer":"BD"}],"judge":[{"id":"j1","type":"judge","question":"一个人的成长奋斗，离不开核心价值观的指引。","answer":"Y"},{"id":"j2","type":"judge","question":"社会主义核心价值观只是一种价值理念,与行为无关。","answer":"N"},{"id":"j3","type":"judge","question":"文化的力量，归根到底来自于凝结其中的核心价值观的影响力和感召力；文化软实力的竞争，本质上是不同文化所代表的核心价值观的竞争。","answer":"Y"},{"id":"j4","type":"judge","question":"社会主义核心价值体系体现了社会主义核心价值观的根本性质和基本特征。","answer":"N"},{"id":"j5","type":"judge","question":"富强、民主、文明、和谐，这一价值追求回答了我们要建设什么样的社会的重大问题。","answer":"N"},{"id":"j6","type":"judge","question":"自由、平等、公正、法治，这一价值追求回答了我们要培育什么样的公民的重大问题，涵盖了社会公德、职业道德、家庭美德、个人品德等各个方面，是每一个公民都应当遵守的道德规范。","answer":"N"},{"id":"j7","type":"judge","question":"当今世界，文化软实力越来越成为争夺发展制高点、道义制高点的关键所在。而核心价值观是文化软实力的灵魂、文化软实力建设的重点。","answer":"Y"},{"id":"j8","type":"judge","question":"社会主义核心价值观的先进性，体现在它代表的是最广大人民的根本利益。","answer":"N"},{"id":"j9","type":"judge","question":"社会主义核心价值观是社会主义核心价值体系的精神内核，它体现了社会主义核心价值体系的根本性质和基本特征，反映了社会主义核心价值体系的丰富内涵和实践要求，是社会主义核心价值体系的高度凝练和集中表达。","answer":"Y"},{"id":"j10","type":"judge","question":"核心价值观的养成绝非一日之功。大学生要坚持由难到易、由远及远，大事做起。","answer":"N"},{"id":"j11","type":"judge","question":"道德来源于经济关系，而经济关系在阶级社会中主要表现为阶级关系，道德必然带有阶级属性。","answer":"Y"},{"id":"j12","type":"judge","question":"慎独自律就是在无人知晓、无人监督的情况下，仍能坚守道德操守，自觉自愿的按道德要求办事。","answer":"Y"},{"id":"j13","type":"judge","question":"反映先进生产力发展要求和进步阶级利益的道德，对社会的发展和进步产生积极的推动作用。","answer":"Y"},{"id":"j14","type":"judge","question":"公共生活、职业生活和婚姻家庭生活是人们社会生活中重要的三大领域。","answer":"Y"},{"id":"j15","type":"judge","question":"法律与道德同属于由一定经济基础决定的上层建筑和社会意识形态，都是规范人们行为的，可以相互替代。","answer":"N"},{"id":"j16","type":"judge","question":"推崇仁爱原则，追求人际和谐是中华民族优良道德传统的内容之一。","answer":"Y"},{"id":"j17","type":"judge","question":"全心全意为人民服务是贯穿中国革命道德始终的一根红线，也是中国共产党在中国革命实践中的一个伟大创造。","answer":"Y"},{"id":"j18","type":"judge","question":"道德是国家强制力保证实施的。","answer":"N"},{"id":"j19","type":"judge","question":"中国革命道德是超越了中华传统美德的时代局限而形成的一种崭新的道德。","answer":"Y"},{"id":"j20","type":"judge","question":"集体主义是对个人的压制、对个性的束缚。","answer":"N"},{"id":"j21","type":"judge","question":"网络社会再复杂，本质上仍然是现实社会中人们的真实生活。","answer":"Y"},{"id":"j22","type":"judge","question":"每个人的正当利益，都是国家利益、社会整体利益不可分割的组成部分。","answer":"Y"},{"id":"j23","type":"judge","question":"职业生活中的道德规范，不仅对各行各业的从业者具有引导和约束作用，也是促进社会持续健康、有序发展的必要条件。","answer":"Y"},{"id":"j24","type":"judge","question":"在社会中，人既作为个体而存在，又作为集体中的一员而存在，集体和个人是不能分割的。","answer":"Y"},{"id":"j25","type":"judge","question":"家是国的基础，国是家的倚靠，家与国从来都不是割裂的，而是相互联系、彼此支撑。","answer":"Y"},{"id":"j26","type":"judge","question":"一切社会领域的道德建设，最终都要落实到个人品德的养成上。","answer":"Y"},{"id":"j27","type":"judge","question":"个人品德在社会道德建设中具有基础性作用。","answer":"Y"},{"id":"j28","type":"judge","question":"法是统治阶级意志的体现，即统治阶级内部每个成员意志之和。","answer":"N"},{"id":"j29","type":"judge","question":"法律不是从来就有的，也不会永恒存在。","answer":"Y"},{"id":"j30","type":"judge","question":"我国所有的法律，表示同意的票数过半即通过。","answer":"N"},{"id":"j31","type":"judge","question":"国务院作为国家最高行政机关没有法律案的提案权。","answer":"N"},{"id":"j32","type":"judge","question":"人民法院代表国家行使法律监督权，人民检察院代表国家行使公诉权。","answer":"N"},{"id":"j33","type":"judge","question":"作为国家的根本大法----宪法，高高在上和我们的生活没有关系。","answer":"N"},{"id":"j34","type":"judge","question":"根据法律规定的内容不同，可以将法律划分为实体法和程序法。","answer":"Y"},{"id":"j35","type":"judge","question":"实体法，是指规定具体权利义务内容或者法律保护的具体情况的法律。","answer":"Y"},{"id":"j36","type":"judge","question":"我国的程序法律部门只有诉讼法，不包括非诉讼程序法。","answer":"N"},{"id":"j37","type":"judge","question":"公正是法治的生命线。要让人民群众在每一个司法案件中感受到公平正义。","answer":"Y"},{"id":"j38","type":"judge","question":"一般地，法治思维包括，法律至上、权力制约、公平正义、人权保障、正当程序等内容。","answer":"Y"},{"id":"j39","type":"judge","question":"司法保障是权利保障的最后防线。","answer":"Y"},{"id":"j40","type":"judge","question":"没有无义务的权利，也没有无权利的义务。","answer":"Y"},{"id":"j41","type":"judge","question":"公民对国家机关和国家工作人员在工作中的错误、缺点提出谴责性的意见是行使公民的监督权。","answer":"Y"},{"id":"j42","type":"judge","question":"在现代法治社会，人们行使任何权利、做任何事情都不能超越法律界限。","answer":"Y"},{"id":"j43","type":"judge","question":"党内法规也是中国特色社会主义法治体系的组成部分。","answer":"Y"},{"id":"j44","type":"judge","question":"法律权利的内容、分配和实现方式因社会制度和国家法律的不同而存在差异。","answer":"Y"},{"id":"j45","type":"judge","question":"全面推进依法治国，总目标是建设中国特色社会主义法治体系，建设社会主义法治国家。","answer":"Y"},{"id":"j46","type":"judge","question":"法治是治国理政的重要方式，德治是治国理政的基本方式。","answer":"N"},{"id":"j47","type":"judge","question":"法律是治国之重器，立法是法治的龙头环节。","answer":"Y"},{"id":"j48","type":"judge","question":"党的领导是中国特色社会主义最本质的特征，是社会主义法治最根本的保证。","answer":"Y"},{"id":"j49","type":"judge","question":"社会主义法律是人类历史上唯一以公有制为基础的新型法律制度。","answer":"Y"},{"id":"j50","type":"judge","question":"法律是底线的道德，也是道德的保障。","answer":"Y"}],"essay":[{"id":"e1","type":"essay","question":"请简述大学生应当如何自觉践行社会主义核心价值观？","answer":"青年的价值取向，既关系着自己的健康成长成才，又决定着未来整个社会的价值取向。青年是引风气之先的社会力量。在全社会培育和弘扬社会主义核心价值观，需要大学生始终走在时代前列，成为社会主义核心价值观的坚定信仰者、积极传播者、模范践行者。\n   （一）扣好人生的扣子\n    ①大学生成长成才和全面发展，离不开正确价值观的引领。面对世界范围内各种思想文化交流交融交锋的新形势，面对整个社会思想价值观念呈现多元多样、复杂多变的新特点，大学生健康成长成才更加需要正确价值观的引领。\n②核心价值观的养成绝非一日之功。大学生要坚持由易到难、由近及远，从现在做起，从自己做起，努力把核心价值观的要求变成日常的行为准则，形成自觉奉行的信念理念，并身体力行大力将其推广到全社会去，为实现国家富强、民族振兴、人民幸福的中国梦凝聚强大的青春能量。\n    （二）勤学修德明辨笃实\n    培育和践行社会主义核心价值观，既要目标高远，保持定力、不懈奋进，又要脚踏实地，严于律己、精益求精，将社会主义核心价值观转化为人生的价值准则，勤学以增智、修德以立身、明辨以正心、笃实以为功。"},{"id":"e2","type":"essay","question":"请简述社会主义道德为什么要以为人民服务为核心？","answer":"为人民服务是社会主义道德的核心。这主要是因为：\n（1）为人民服务是社会主义经济基础和人际关系的客观要求\n在我国，以公有制为主体和以按劳分配为主体，是为人民服务的根本制度保证，在此基础上逐步形成的团结互助、平等友爱、共同进步的人际关系，是为人民服务的基础。\n（2）为人民服务是社会主义市场经济健康发展的要求\n社会主义市场经济本质上要求为人民服务，不仅在于人们在一切经济活动中，应正确处理个人与社会、竞争与协作、效率与公平、先富与共富、经济效益与社会效益等关系；更在于强调在社会主义物质文明和精神文明的引导下，每个市场主体都要有为人民服务的思想。\n（3）为人民服务是先进性要求和广泛性要求的统一\n为人民服务，既伟大又平凡，既高尚又普通，它并非高不可攀、远不可及，而是可以通过不同层次、不同形式表现出来。\n为人民服务作为社会主义道德的核心，是社会主义道德区别和优越于其他社会形态道德的显著标志。"},{"id":"e3","type":"essay","question":"大学生应当如何培养法治思维？请联系实际谈谈你的看法。","answer":"法治思維是指以法治价值和法治精神为导向，运用法律原则、法律规则、法律方法思考和处理问题的思维模式。一般来讲，法治思维主要包括法律至上、权力制约、公平正义、权利保障、正当程序等内容。\n对于大学生培养法治思维的方法，我认为有以下几点：\n(1)学习法律知识\n学习和掌握基本的法律知识，是培养法治思维的前提。法律知识通常包括法律法规方面的知识和法律原理方面的知识，这两部分法律知识对于培养法治思维都很重要。只有了解法律法规及其原理、原则，才能更好地领会法律精神，养成法治思维。\n(2)掌握法律方法\n法治思维的过程，就是运用法律方法思考、分析和解决法律问题的过程。法律方法主要包括两个方面；正确理解法律的方法，包括理解法律条文的含义、内容和精神等；正确运用法律的方法。理解和运用法律的基本方法， 有助于培养法治思维。\n(3)参与法律实践\n法治思维是在丰富的法治实践中训练、培养和应用的思维方式。只有通过参与各种法律活动，才能养成自觉的法治思维习惯。人们参加法律实践的方法：一是参与立法讨论；二是依法行使监督权；三是旁听司法审判；四是参与模拟法庭、法律诊所、法律辩论等活动。\n(4)养成守法习惯\n法治思维是一种习惯性思维，与长期自觉养成的生活习惯有很大关系。公民只有自觉遵守宪法和法律，坚持从我做起，从身边做起，从具体问题做起，才能养成守法的习惯和法治思维。\n(5)守住法律底线\n法律红线不可逾越、法律底线不可触碰。法律不能成为“橡皮泥”“稻草人”，触犯法律底线就要受到追究。 坚持从自我做起，形成底线私我，严守法律底线，带头遵守法律。"},{"id":"e4","type":"essay","question":"联系我国实际，说明社会主义法律的本质特征。","answer":"我国社会主义法律，是在中国共产党领导的新民主主义革命时期孕育，在社会主义制度建立后确立并在社会主义建设中不断发展的。我国社会主义法律的本质主要表现在以下几个方面：\n(1)从法律所体现的意志来看，我国社会主义法律是工人阶级领导下的广大人民意志的体现。从本质上说，我国社会主义法律是中国特色社会主义制度的重要组成部分，是党领导人民当家作主的制度保障。我国社会主义法律体现了党的主张和人民意志的统一。党领导人民制定和实施宪法法律，党自身必须在宪法法律范围内活动，这就是党的领导力量的体现，也是我国社会主义法律最本质特征的具体表现。\n(2)从法律的实质内容来看，具有鲜明的科学性和先进性。我国社会主义法律反应全体人民共同意志，与历史发展的基本方向和规律一致，是社会历史发展规律和自然规律的反映。\n(3)从法律的社会作用来看，我国社会主义法律是中国特色社会主义事业顺利发展的有力保障。在经济建设方面、政治建设方面、社会建设方面社会主义法律都发挥着重要的作用。我国法律的社会作用体现了社会主义的本质要求，经济发展、政治清明、文化昌盛、社会公正、生态良好，都离不开社会主义法律的引领、规范和保障。"},{"id":"e5","type":"essay","question":"如何正确理解法律权利与法律义务的关系？","answer":"法律权利与法律义务的关系，不可分割，相互依存。没有权利，义务的设定就失去了目的和根据；没有义务，权利的实现也就成为空话。在社会生活中，每个人既是享受各种法律权利的主体，又是承担各种法律义务的主体。\n（1）法律权利和法律义务的关系有以下几点：\n①二者是相互依存的关系\n法律权利的实现必须以相应法律义务的履行为条件;法律义务的设定和履行也必须以法律权利的行使为根据, 法治社会中不存在没有权利根据的法律义务。\n②二者是目的与手段的关系\n离开了法律权利，法律义务就失去了履行的价值和动力。离开了法律义务，法律权利也形同虚设。\n③二者具有复合性的关系\n即一个行为可以同时是权利行为和义务行为。\n（2）法律权利与法律义务平等，是现代法治的基本原则，是社会公平正义的重要方面。法律权利与法律义务平等表现为法律面前人人平等被确立为基本原则；在法律权利和法律义务的具体设定上要平等；权利与义务的实现要体现平等。\n（3）在法律权利与法律义务相一致的情况下，一个人无论是行使权利还是履行义务，实际上都是对自己有利的。大学生应当正确把握依法行使权利、履行义务的基本要求，既珍惜自己权利又尊重他人权利，既善于行驶权利又自觉履行义务。"}]}</script>

<!-- Toast / Modal 容器 -->
<div class="toast-wrap" id="toast-wrap"></div>
<div id="modal-root"></div>

<script>
// =============================================================
// 思政刷题 · 报告委员长 - 主程序
// =============================================================
"use strict";

const QUESTION_BANK = JSON.parse(document.getElementById('qbank-data').textContent);
const TYPES = {single:'单选题', multi:'多选题', judge:'判断题', essay:'简答题'};
const TYPE_ORDER = ['single','multi','judge','essay'];
const NS = 'mac-quiz-';
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const el = (tag, props={}, ...children) => {
  const e = document.createElement(tag);
  for (const k in props) {
    if (k === 'class') e.className = props[k];
    else if (k === 'dataset') Object.assign(e.dataset, props[k]);
    else if (k.startsWith('on') && typeof props[k]==='function') e.addEventListener(k.slice(2).toLowerCase(), props[k]);
    else if (k === 'html') e.innerHTML = props[k];
    else e.setAttribute(k, props[k]);
  }
  children.flat().forEach(c => {
    if (c == null) return;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return e;
};

// =============================================================
// DataLayer - localStorage 持久化
// =============================================================
const DataLayer = {
  get(key, fallback=null) {
    try { const v = localStorage.getItem(NS+key); return v == null ? fallback : JSON.parse(v); }
    catch(e) { return fallback; }
  },
  set(key, value) {
    try { localStorage.setItem(NS+key, JSON.stringify(value)); return true; }
    catch(e) { Toast.error('存储空间不足，请导出数据后清理'); return false; }
  },
  remove(key) { localStorage.removeItem(NS+key); },
  loadAll() {
    return {
      settings: this.get('settings', {theme:'auto', fsQuizStem:22, bgImage:1, lastConfig:null}),
      wrongQuestions: this.get('wrongQuestions', {}),
      activeSession: this.get('activeSession', null),
      history: this.get('history', []),
    };
  }
};

// =============================================================
// Store - 简单状态管理
// =============================================================
const Store = {
  state: {},
  subs: new Set(),
  init() {
    this.state = {
      route: location.hash || '#/home',
      ...DataLayer.loadAll(),
      quizSession: null,
    };
    this.applyTheme();
    this.applyFontSize();
    this.applyBackground();
  },
  setState(patch, persistKeys=[]) {
    Object.assign(this.state, patch);
    persistKeys.forEach(k => DataLayer.set(k, this.state[k]));
    this.subs.forEach(fn => fn(this.state));
  },
  applyTheme() {
    const t = this.state.settings?.theme || 'auto';
    if (t === 'auto') {
      const dark = matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.dataset.theme = dark ? 'dark' : 'light';
    } else {
      document.documentElement.dataset.theme = t;
    }
  },
  applyFontSize() {
    const fs = this.state.settings?.fsQuizStem || 22;
    document.documentElement.style.setProperty('--fs-quiz-stem', fs+'px');
  },
  applyBackground() {
    const bg = this.state.settings?.bgImage || 1;
    document.documentElement.style.setProperty('--bg-image', `url("backgrounds/bg-${bg}.jpg")`);
  },
  updateSettings(patch) {
    this.state.settings = {...this.state.settings, ...patch};
    DataLayer.set('settings', this.state.settings);
    this.applyTheme();
    this.applyFontSize();
    this.applyBackground();
  }
};

// =============================================================
// QuestionBank - 题库访问
// =============================================================
const QBank = {
  total: () => Object.values(QUESTION_BANK).flat().length,
  countByType: () => {
    const r = {};
    TYPE_ORDER.forEach(t => r[t] = (QUESTION_BANK[t] || []).length);
    return r;
  },
  byId(id) {
    for (const t of TYPE_ORDER) {
      const q = (QUESTION_BANK[t] || []).find(q => q.id === id);
      if (q) return q;
    }
    return null;
  },
  filter(types) { return types.flatMap(t => QUESTION_BANK[t] || []); },
};

// =============================================================
// QuizEngine - 会话生成、判分
// =============================================================
const QuizEngine = {
  shuffle(arr) {
    const a = [...arr];
    for (let i = a.length-1; i > 0; i--) {
      const j = Math.floor((performance.now()*1000 + i) % (i+1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  },
  create(config) {
    let pool;
    if (config.onlyWrong) {
      const wrongIds = Object.keys(Store.state.wrongQuestions || {});
      pool = wrongIds.map(id => QBank.byId(id)).filter(q => q && config.types.includes(q.type));
    } else {
      pool = QBank.filter(config.types);
    }
    if (config.order === 'random') pool = this.shuffle(pool);
    const n = config.count === 0 ? pool.length : Math.min(config.count, pool.length);
    return {
      id: 'sess_'+Date.now().toString(36),
      config,
      questions: pool.slice(0, n),
      answers: {},
      currentIdx: 0,
      startedAt: Date.now(),
      finishedAt: null,
    };
  },
  check(question, userAnswer) {
    if (question.type === 'single' || question.type === 'judge') {
      return userAnswer === question.answer;
    }
    if (question.type === 'multi') {
      const u = Array.isArray(userAnswer) ? [...userAnswer].sort().join('') : (userAnswer || '');
      return u === question.answer;
    }
    return userAnswer === true;
  },
  submit(session, userAnswer) {
    const q = session.questions[session.currentIdx];
    const ok = this.check(q, userAnswer);
    session.answers[q.id] = { user: userAnswer, correct: ok, ts: Date.now() };
    if (!ok) WrongStore.record(q);
    else if (session.config.skipCorrect) WrongStore.removeIfPresent(q.id);
    DataLayer.set('activeSession', session);
    return ok;
  },
  next(session) {
    if (session.currentIdx < session.questions.length - 1) {
      session.currentIdx++;
      DataLayer.set('activeSession', session);
      return true;
    }
    return false;
  },
  finish(session) {
    session.finishedAt = Date.now();
    const total = session.questions.length;
    const correct = Object.values(session.answers).filter(a => a.correct).length;
    const rate = total ? Math.round((correct/total)*100) : 0;
    const byType = {};
    TYPE_ORDER.forEach(t => byType[t] = {total:0, correct:0});
    session.questions.forEach(q => {
      byType[q.type].total++;
      if (session.answers[q.id]?.correct) byType[q.type].correct++;
    });
    const record = {
      id: session.id,
      startedAt: session.startedAt,
      finishedAt: session.finishedAt,
      total, correct, rate, byType,
      config: session.config,
    };
    const history = [...(Store.state.history || []), record].slice(-50);
    Store.setState({history, activeSession:null}, ['history']);
    DataLayer.remove('activeSession');
    return record;
  }
};

// =============================================================
// WrongStore - 错题集
// =============================================================
const WrongStore = {
  record(q) {
    const wq = Store.state.wrongQuestions || {};
    const ex = wq[q.id];
    wq[q.id] = {
      id: q.id, type: q.type,
      times: (ex?.times || 0) + 1,
      lastAt: Date.now(),
      firstAt: ex?.firstAt || Date.now(),
    };
    Store.setState({wrongQuestions: wq}, ['wrongQuestions']);
  },
  removeIfPresent(id) {
    const wq = Store.state.wrongQuestions || {};
    if (wq[id]) {
      delete wq[id];
      Store.setState({wrongQuestions: wq}, ['wrongQuestions']);
      return true;
    }
    return false;
  },
  clear() {
    Store.setState({wrongQuestions: {}}, ['wrongQuestions']);
  },
  list(filterType) {
    const wq = Store.state.wrongQuestions || {};
    let arr = Object.values(wq);
    if (filterType && filterType !== 'all') arr = arr.filter(w => w.type === filterType);
    return arr.sort((a,b) => b.lastAt - a.lastAt);
  },
  countByType() {
    const wq = Store.state.wrongQuestions || {};
    const r = {all:0};
    TYPE_ORDER.forEach(t => r[t]=0);
    Object.values(wq).forEach(w => { r.all++; if (r[w.type]!=null) r[w.type]++; });
    return r;
  }
};

// =============================================================
// StatsCalc - 统计计算
// =============================================================
const StatsCalc = {
  overall() {
    const h = Store.state.history || [];
    if (!h.length) return {totalSessions:0, totalQ:0, totalCorrect:0, rate:0, wrongCount:0, wrongRate:0};
    const totalQ = h.reduce((s,r) => s+r.total, 0);
    const totalCorrect = h.reduce((s,r) => s+r.correct, 0);
    const rate = totalQ ? Math.round((totalCorrect/totalQ)*100) : 0;
    const wrongCount = Object.keys(Store.state.wrongQuestions||{}).length;
    const wrongRate = totalQ ? Math.round((wrongCount/QBank.total())*100) : 0;
    return {totalSessions:h.length, totalQ, totalCorrect, rate, wrongCount, wrongRate};
  },
  byType() {
    const h = Store.state.history || [];
    const r = {};
    TYPE_ORDER.forEach(t => r[t] = {total:0, correct:0});
    h.forEach(rec => {
      TYPE_ORDER.forEach(t => {
        r[t].total += rec.byType[t]?.total || 0;
        r[t].correct += rec.byType[t]?.correct || 0;
      });
    });
    return r;
  },
  recent(n=7) {
    return (Store.state.history || []).slice(-n).map(r => ({
      date: new Date(r.finishedAt).toLocaleDateString('zh-CN', {month:'2-digit', day:'2-digit'}),
      rate: r.rate,
    }));
  }
};

// =============================================================
// Toast 通知
// =============================================================
const Toast = {
  show(msg, type='info', dur=2400) {
    const wrap = $('#toast-wrap');
    const t = el('div', {class:'toast '+type}, msg);
    wrap.appendChild(t);
    setTimeout(() => { t.style.opacity='0'; t.style.transform='translateY(-12px)'; setTimeout(()=>t.remove(), 300); }, dur);
  },
  success(m){this.show(m,'success')},
  error(m){this.show(m,'error',3600)},
  warn(m){this.show(m,'warn',3000)},
};

// =============================================================
// Modal 模态
// =============================================================
const Modal = {
  show({title, body, actions}) {
    const root = $('#modal-root');
    root.innerHTML = '';
    const backdrop = el('div', {class:'modal-backdrop'});
    const card = el('div', {class:'modal-card glass-window'});
    card.appendChild(el('h3', {}, title));
    card.appendChild(el('p', {}, body));
    const actWrap = el('div', {class:'modal-actions'});
    actions.forEach(a => {
      const b = el('button', {class:'glass-btn '+(a.kind||''), onclick: () => { backdrop.remove(); a.onClick && a.onClick(); }}, a.label);
      actWrap.appendChild(b);
    });
    card.appendChild(actWrap);
    backdrop.appendChild(card);
    backdrop.addEventListener('click', (e) => { if (e.target === backdrop) backdrop.remove(); });
    root.appendChild(backdrop);
  }
};

// =============================================================
// Router
// =============================================================
const Router = {
  routes: {},
  on(hash, fn) { this.routes[hash.replace(/\?.*$/,'')] = fn; },
  start() {
    addEventListener('hashchange', () => this.handle());
    if (!location.hash) location.hash = '#/home';
    else this.handle();
  },
  handle() {
    const full = location.hash || '#/home';
    const [path, qs] = full.split('?');
    const params = {};
    if (qs) qs.split('&').forEach(kv => { const [k,v]=kv.split('='); params[k]=decodeURIComponent(v||''); });
    Store.setState({route: full});
    const fn = this.routes[path] || this.routes['#/home'];
    fn(params);
  },
  go(hash) { location.hash = hash; }
};

// =============================================================
// UI Renderers
// =============================================================
const UI = {
  tpl(id) { return $('#'+id).content.cloneNode(true); },
  mount(node) {
    const body = $('#app-body');
    body.innerHTML = '';
    body.appendChild(node);
    body.querySelectorAll('[data-go]').forEach(b => b.addEventListener('click', () => Router.go(b.dataset.go)));
  },

  renderHome() {
    const f = this.tpl('tpl-home');
    const wq = WrongStore.countByType();
    f.querySelector('#home-wrong-meta').textContent = wq.all ? `共 ${wq.all} 题待复习` : '暂无错题，继续保持';
    const stats = StatsCalc.overall();
    f.querySelector('#home-stats-meta').textContent = stats.totalSessions ? `${stats.totalSessions} 次 · 正确率 ${stats.rate}%` : '未开始';
    // resume banner
    const session = DataLayer.get('activeSession');
    if (session && session.questions && session.currentIdx < session.questions.length) {
      const banner = el('div', {class:'resume-banner liquid'});
      banner.appendChild(el('div', {class:'resume-banner-text'}, `⏯ 上次未完成会话 (已答 ${Object.keys(session.answers).length}/${session.questions.length})，是否继续？`));
      const acts = el('div', {class:'resume-banner-actions'});
      acts.appendChild(el('button', {class:'glass-btn primary', onclick: () => { Store.setState({quizSession: session}); Router.go('#/quiz'); }}, '继续'));
      acts.appendChild(el('button', {class:'glass-btn', onclick: () => { DataLayer.remove('activeSession'); banner.remove(); }}, '放弃'));
      banner.appendChild(acts);
      f.querySelector('#resume-slot').appendChild(banner);
    }
    this.mount(f);
  },

  renderQuizSetup() {
    const f = this.tpl('tpl-quiz-setup');
    const counts = QBank.countByType();
    const last = Store.state.settings?.lastConfig || {types:['single','judge'], count:20, order:'sequence', onlyWrong:false, skipCorrect:true};
    const config = {...last};
    const grid = f.querySelector('#type-grid');
    TYPE_ORDER.forEach(t => {
      const card = el('label', {class:'type-choice liquid'+(config.types.includes(t)?' selected':'')});
      const cb = el('input', {type:'checkbox', value:t});
      cb.checked = config.types.includes(t);
      card.appendChild(cb);
      card.appendChild(el('span', {class:'tc-label'}, TYPES[t]));
      card.appendChild(el('span', {class:'tc-count'}, counts[t]+''));
      cb.addEventListener('change', () => {
        if (cb.checked) { if (!config.types.includes(t)) config.types.push(t); }
        else config.types = config.types.filter(x => x !== t);
        card.classList.toggle('selected', cb.checked);
        updatePreview();
      });
      grid.appendChild(card);
    });
    // preview (必须在 setCount 之前声明, 因为 setCount → updatePreview → previewNum/btnStart)
    const previewNum = f.querySelector('#preview-num');
    const btnStart = f.querySelector('#btn-start-quiz');
    function updatePreview() {
      const poolSize = config.onlyWrong
        ? WrongStore.list().filter(w => config.types.includes(w.type)).length
        : config.types.reduce((s,t) => s + counts[t], 0);
      const n = config.count === 0 ? poolSize : Math.min(config.count, poolSize);
      previewNum.textContent = n;
      btnStart.disabled = n === 0 || config.types.length === 0;
    }
    // count presets + slider
    const slider = f.querySelector('#count-slider');
    const cv = f.querySelector('#count-value');
    const presets = f.querySelectorAll('.count-preset');
    const setCount = (n) => {
      config.count = n;
      slider.value = n === 0 ? slider.max : n;
      cv.textContent = n === 0 ? '全部' : n;
      presets.forEach(p => p.classList.toggle('selected', +p.dataset.count === n));
      updatePreview();
    };
    presets.forEach(p => p.addEventListener('click', () => setCount(+p.dataset.count)));
    slider.addEventListener('input', () => {
      config.count = +slider.value;
      cv.textContent = slider.value;
      presets.forEach(p => p.classList.remove('selected'));
      updatePreview();
    });
    setCount(config.count);
    // order
    const orderSeg = f.querySelector('#order-seg');
    orderSeg.querySelectorAll('.seg-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.order === config.order);
      b.addEventListener('click', () => {
        config.order = b.dataset.order;
        orderSeg.querySelectorAll('.seg-btn').forEach(x => x.classList.toggle('active', x === b));
      });
    });
    // switches
    const ow = f.querySelector('#only-wrong'); ow.checked = config.onlyWrong;
    ow.addEventListener('change', () => { config.onlyWrong = ow.checked; updatePreview(); });
    const sc = f.querySelector('#skip-correct'); sc.checked = config.skipCorrect;
    sc.addEventListener('change', () => { config.skipCorrect = sc.checked; });
    btnStart.addEventListener('click', () => {
      const session = QuizEngine.create(config);
      if (!session.questions.length) { Toast.warn('题库为空，请调整配置'); return; }
      Store.updateSettings({lastConfig: config});
      Store.setState({quizSession: session});
      DataLayer.set('activeSession', session);
      Router.go('#/quiz');
    });
    this.mount(f);
  },

  renderQuiz() {
    let session = Store.state.quizSession || DataLayer.get('activeSession');
    if (!session) { Router.go('#/quiz-setup'); return; }
    Store.state.quizSession = session;
    const f = this.tpl('tpl-quiz');
    this.mount(f);
    this.renderQuizQuestion();
  },

  renderQuizQuestion() {
    const session = Store.state.quizSession;
    if (!session) return;
    if (session.currentIdx >= session.questions.length) { this.renderResult(); return; }
    const q = session.questions[session.currentIdx];
    const total = session.questions.length;
    $('#q-counter').textContent = `${session.currentIdx+1} / ${total}`;
    $('#q-progress').style.width = (((session.currentIdx)/total)*100)+'%';
    const main = $('#quiz-main');
    main.innerHTML = '';
    const answered = session.answers[q.id];
    // meta
    const meta = el('div', {class:'q-meta'});
    meta.appendChild(el('span', {class:'pill-badge'}, `${TYPES[q.type]} · 第 ${session.currentIdx+1} 题`));
    main.appendChild(meta);
    // stem card
    const stem = el('div', {class:'q-stem-card glass-card'});
    stem.appendChild(el('div', {class:'q-stem'}, q.question));
    main.appendChild(stem);
    // options
    const state = { selected: answered ? answered.user : (q.type === 'multi' ? [] : null), locked: !!answered };
    if (q.type === 'single' || q.type === 'multi') {
      const list = el('div', {class:'opt-list'});
      ['A','B','C','D'].forEach(k => {
        if (!q.options || !q.options[k]) return;
        const card = el('button', {class:'opt-card liquid'});
        const letter = el('div', {class:'opt-letter'}, k);
        const body = el('div', {class:'opt-body'}, q.options[k]);
        card.appendChild(letter); card.appendChild(body);
        const updateCardClass = () => {
          card.className = 'opt-card';
          if (state.locked) card.classList.add('locked');
          if (q.type === 'multi') {
            if (state.selected.includes(k)) card.classList.add('selected');
          } else {
            if (state.selected === k) card.classList.add('selected');
          }
          if (state.locked) {
            const ans = q.answer;
            const isCorrectOpt = (q.type==='multi' ? ans.includes(k) : ans===k);
            const userChose = (q.type==='multi' ? state.selected.includes(k) : state.selected===k);
            if (isCorrectOpt) card.classList.add('correct');
            else if (userChose) card.classList.add('wrong');
          }
        };
        card.addEventListener('click', () => {
          if (state.locked) return;
          if (q.type === 'single') {
            state.selected = k;
            list.querySelectorAll('.opt-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            this.submitAnswer(state.selected);
          } else {
            const i = state.selected.indexOf(k);
            if (i >= 0) state.selected.splice(i,1); else state.selected.push(k);
            updateCardClass();
            multiSubmitBtn.disabled = state.selected.length === 0;
          }
        });
        updateCardClass();
        list.appendChild(card);
      });
      main.appendChild(list);
      let multiSubmitBtn = null;
      if (q.type === 'multi' && !state.locked) {
        multiSubmitBtn = el('button', {class:'glass-btn primary large'}, '提交答案');
        multiSubmitBtn.disabled = true;
        multiSubmitBtn.addEventListener('click', () => this.submitAnswer([...state.selected].sort().join('')));
        main.appendChild(el('div', {class:'row', style:'justify-content:center;margin-bottom:16px'}, multiSubmitBtn));
      }
    } else if (q.type === 'judge') {
      const pair = el('div', {class:'judge-pair'});
      ['Y','N'].forEach(k => {
        const btn = el('button', {class:'judge-btn liquid '+ (k==='Y'?'y':'n')}, k==='Y' ? '✓ 正确' : '✗ 错误');
        if (state.locked) {
          btn.classList.add('locked');
          if (q.answer === k) btn.classList.add('correct');
          else if (state.selected === k) btn.classList.add('wrong');
        }
        btn.addEventListener('click', () => {
          if (state.locked) return;
          this.submitAnswer(k);
        });
        pair.appendChild(btn);
      });
      main.appendChild(pair);
    } else if (q.type === 'essay') {
      const ta = el('textarea', {class:'essay-area', placeholder:'请在此输入你的答案...（简答题为自评模式）'});
      if (answered && answered.userText) ta.value = answered.userText;
      ta.disabled = state.locked;
      main.appendChild(ta);
      const refCard = el('div', {class:'essay-ref hidden'});
      refCard.appendChild(el('h4', {}, '参考答案'));
      refCard.appendChild(el('div', {}, q.answer));
      main.appendChild(refCard);
      const judgeWrap = el('div', {class:'essay-self-judge hidden'});
      const showRefBtn = el('button', {class:'glass-btn primary'}, '查看参考答案');
      showRefBtn.addEventListener('click', () => {
        refCard.classList.remove('hidden');
        judgeWrap.classList.remove('hidden');
        showRefBtn.remove();
      });
      judgeWrap.appendChild(el('button', {class:'glass-btn primary', onclick: () => this.submitEssay(q, ta.value, true)}, '我答对了'));
      judgeWrap.appendChild(el('button', {class:'glass-btn danger', onclick: () => this.submitEssay(q, ta.value, false)}, '我答错了'));
      main.appendChild(el('div', {class:'row mt-4', style:'justify-content:center'}, showRefBtn));
      main.appendChild(judgeWrap);
      if (state.locked) { refCard.classList.remove('hidden'); showRefBtn.remove(); }
    }
    // feedback (if answered)
    if (answered) this.renderFeedback(q, answered);
    // bottom actions
    const actions = el('div', {class:'quiz-actions'});
    const exitBtn = el('button', {class:'glass-btn', onclick: () => this.exitQuiz()}, '保存并退出');
    actions.appendChild(exitBtn);
    if (answered) {
      const isLast = session.currentIdx === session.questions.length - 1;
      const nextBtn = el('button', {class:'glass-btn primary large', onclick: () => {
        if (isLast) this.renderResult();
        else { QuizEngine.next(session); this.renderQuizQuestion(); }
      }}, isLast ? '查看成绩 →' : '下一题 →');
      actions.appendChild(nextBtn);
    } else {
      actions.appendChild(el('button', {class:'glass-btn', onclick: () => { QuizEngine.submit(session, q.type==='multi'?'':null); QuizEngine.next(session); this.renderQuizQuestion(); }}, '跳过 →'));
    }
    main.appendChild(actions);
    $('#btn-quiz-exit').onclick = () => this.exitQuiz();
    // 答题后自动滚动到反馈+下一题, 并聚焦"下一题"按钮(Enter可直接进入下一题)
    if (answered) {
      const nextBtn = actions.querySelector('.glass-btn.primary');
      requestAnimationFrame(() => {
        (nextBtn || actions).scrollIntoView({behavior:'smooth', block:'center'});
        if (nextBtn) nextBtn.focus({preventScroll:true});
      });
    }
  },

  submitAnswer(userAnswer) {
    const session = Store.state.quizSession;
    QuizEngine.submit(session, userAnswer);
    this.renderQuizQuestion();
  },

  submitEssay(q, text, selfCorrect) {
    const session = Store.state.quizSession;
    session.answers[q.id] = { user: selfCorrect, userText: text, correct: selfCorrect, ts: Date.now() };
    if (!selfCorrect) WrongStore.record(q);
    else if (session.config.skipCorrect) WrongStore.removeIfPresent(q.id);
    DataLayer.set('activeSession', session);
    this.renderQuizQuestion();
  },

  renderFeedback(q, answered) {
    const main = $('#quiz-main');
    const card = el('div', {class:'feedback-card '+(answered.correct ? 'correct' : 'wrong')});
    card.appendChild(el('div', {class:'fb-title'}, answered.correct ? '✓ 答对了' : '✗ 答错了'));
    if (q.type !== 'essay') {
      const ansText = el('div', {class:'fb-body'});
      ansText.innerHTML = `正确答案：<strong>${q.type==='judge' ? (q.answer==='Y'?'正确':'错误') : q.answer}</strong>`;
      card.appendChild(ansText);
    }
    main.appendChild(card);
  },

  exitQuiz() {
    Modal.show({
      title: '保存进度并退出？',
      body: '当前进度已自动保存，下次进入首页可以从断点继续。',
      actions: [
        {label:'取消', kind:''},
        {label:'退出', kind:'primary', onClick: () => Router.go('#/home')}
      ]
    });
  },

  renderResult() {
    const session = Store.state.quizSession;
    if (!session) { Router.go('#/home'); return; }
    const record = QuizEngine.finish(session);
    const f = this.tpl('tpl-result');
    f.querySelector('#res-rate').textContent = record.rate + '%';
    f.querySelector('#res-right').textContent = record.correct;
    f.querySelector('#res-wrong').textContent = record.total - record.correct;
    const pt = f.querySelector('#res-pertype');
    pt.appendChild(el('h3', {style:'font-size:var(--fs-h3);font-weight:600;margin-bottom:16px;text-align:left'}, '按题型分布'));
    TYPE_ORDER.forEach(t => {
      const data = record.byType[t];
      if (!data.total) return;
      const row = el('div', {class:'pt-row'});
      row.appendChild(el('div', {class:'pt-label'}, TYPES[t]));
      const track = el('div', {class:'pt-track'});
      const fill = el('div', {class:'pt-fill'});
      track.appendChild(fill);
      row.appendChild(track);
      row.appendChild(el('div', {class:'pt-num'}, `${data.correct}/${data.total}`));
      pt.appendChild(row);
      requestAnimationFrame(() => fill.style.width = (data.total ? (data.correct/data.total*100) : 0) + '%');
    });
    this.mount(f);
    $('#btn-retry').addEventListener('click', () => {
      const session2 = QuizEngine.create(record.config);
      Store.setState({quizSession: session2});
      DataLayer.set('activeSession', session2);
      Router.go('#/quiz');
    });
  },

  renderWrong(params={}) {
    const f = this.tpl('tpl-wrong');
    const activeType = params.type || 'all';
    const counts = WrongStore.countByType();
    f.querySelector('#wrong-count').textContent = `我的错题集 (${counts.all} 题)`;
    const sb = f.querySelector('#wrong-sidebar');
    sb.appendChild(el('h4', {}, '题型筛选'));
    const items = [{key:'all', label:'全部'}, ...TYPE_ORDER.map(t => ({key:t, label:TYPES[t]}))];
    items.forEach(it => {
      const c = counts[it.key] || 0;
      const node = el('div', {class:'ws-item'+(it.key===activeType?' active':'')});
      node.appendChild(el('span', {}, it.label));
      node.appendChild(el('span', {class:'ws-count'}, c+''));
      node.addEventListener('click', () => Router.go('#/wrong?type='+it.key));
      sb.appendChild(node);
    });
    const list = f.querySelector('#wrong-list');
    const arr = WrongStore.list(activeType);
    if (!arr.length) {
      list.appendChild(el('div', {class:'empty-state'},
        el('div', {class:'empty-icon'}, '✨'),
        el('div', {class:'empty-title'}, '暂无错题'),
        el('div', {}, '继续保持，错题都已被你攻克')
      ));
    } else {
      arr.forEach(w => {
        const q = QBank.byId(w.id); if (!q) return;
        const card = el('button', {class:'wq-item liquid', onclick: () => UI.practiceWrong(w.id)});
        const body = el('div', {class:'wq-body'});
        const head = el('div', {class:'wq-head'});
        head.appendChild(el('span', {class:'pill-badge'}, TYPES[q.type]));
        head.appendChild(el('span', {style:'color:var(--color-text-tertiary);font-size:var(--fs-caption)'}, `错 ${w.times} 次`));
        body.appendChild(head);
        body.appendChild(el('div', {class:'wq-stem'}, q.question));
        body.appendChild(el('div', {class:'wq-meta'},
          el('span', {}, '上次错误：'+new Date(w.lastAt).toLocaleString('zh-CN')),
        ));
        const del = el('button', {class:'glass-btn', onclick: (e) => { e.stopPropagation(); WrongStore.removeIfPresent(w.id); UI.renderWrong({type:activeType}); }}, '移除');
        card.appendChild(body);
        card.appendChild(del);
        list.appendChild(card);
      });
    }
    this.mount(f);
    $('#btn-wrong-clear').onclick = () => {
      if (!counts.all) { Toast.warn('错题集已是空的'); return; }
      Modal.show({
        title:'清空所有错题？',
        body:`共 ${counts.all} 道错题将被永久删除，无法恢复。`,
        actions:[{label:'取消'},{label:'确认清空', kind:'danger', onClick:()=>{ WrongStore.clear(); UI.renderWrong(); Toast.success('错题集已清空'); }}]
      });
    };
    $('#btn-wrong-repractice').onclick = () => {
      const wrongList = WrongStore.list(activeType);
      if (!wrongList.length) { Toast.warn('没有可练习的错题'); return; }
      const types = activeType === 'all' ? TYPE_ORDER : [activeType];
      const session = QuizEngine.create({types, count:0, order:'random', onlyWrong:true, skipCorrect:true});
      Store.setState({quizSession: session});
      DataLayer.set('activeSession', session);
      Router.go('#/quiz');
    };
  },

  practiceWrong(id) {
    const q = QBank.byId(id); if (!q) return;
    const session = {
      id: 'practice_'+Date.now().toString(36),
      config: {types:[q.type], count:1, order:'sequence', onlyWrong:true, skipCorrect:true},
      questions: [q],
      answers: {},
      currentIdx: 0,
      startedAt: Date.now(),
      finishedAt: null,
    };
    Store.setState({quizSession: session});
    DataLayer.set('activeSession', session);
    Router.go('#/quiz');
  },

  renderStats() {
    const f = this.tpl('tpl-stats');
    const main = f.querySelector('#stats-main');
    const ov = StatsCalc.overall();
    // KPI
    const kpi = el('div', {class:'kpi-grid'});
    const mk = (label, num, cls='') => {
      const c = el('div', {class:'kpi-card glass-card'});
      c.appendChild(el('div', {class:'kpi-label'}, label));
      c.appendChild(el('div', {class:'kpi-num '+cls}, num));
      return c;
    };
    kpi.appendChild(mk('总刷题数', ov.totalQ+''));
    kpi.appendChild(mk('总正确率', ov.rate+'%', 'accent'));
    kpi.appendChild(mk('错题数', ov.wrongCount+'', 'warn'));
    kpi.appendChild(mk('错题率', ov.wrongRate+'%', 'danger'));
    main.appendChild(kpi);
    // charts
    const charts = el('div', {class:'charts-row'});
    // pie
    const pieCard = el('div', {class:'chart-card glass-card'});
    pieCard.appendChild(el('h3', {}, '按题型分布'));
    const byType = StatsCalc.byType();
    const totalByType = TYPE_ORDER.reduce((s,t) => s+byType[t].total, 0);
    if (totalByType === 0) {
      pieCard.appendChild(el('div', {class:'empty-chart'}, '尚无数据，先去刷一轮吧'));
    } else {
      const colors = {single:'#007AFF', multi:'#8B5CF6', judge:'#34C759', essay:'#FF9500'};
      let acc = 0;
      const gradStops = TYPE_ORDER.map(t => {
        const pct = (byType[t].total/totalByType)*100;
        const seg = `${colors[t]} ${acc}% ${acc+pct}%`;
        acc += pct;
        return seg;
      }).join(', ');
      const pieWrap = el('div', {class:'pie-wrap'});
      const pie = el('div', {style:`width:140px;height:140px;border-radius:50%;background:conic-gradient(${gradStops});box-shadow:inset 0 0 0 4px rgba(255,255,255,0.5),var(--shadow-md)`});
      pieWrap.appendChild(pie);
      const legend = el('div', {class:'pie-legend'});
      TYPE_ORDER.forEach(t => {
        if (byType[t].total === 0) return;
        const pct = Math.round((byType[t].total/totalByType)*100);
        const li = el('div', {class:'legend-item'});
        li.appendChild(el('span', {class:'legend-dot', style:'background:'+colors[t]}));
        li.appendChild(el('span', {}, `${TYPES[t]} ${pct}%`));
        legend.appendChild(li);
      });
      pieWrap.appendChild(legend);
      pieCard.appendChild(pieWrap);
    }
    charts.appendChild(pieCard);
    // line
    const lineCard = el('div', {class:'chart-card glass-card'});
    lineCard.appendChild(el('h3', {}, '近期会话正确率'));
    const recent = StatsCalc.recent(7);
    if (!recent.length) {
      lineCard.appendChild(el('div', {class:'empty-chart'}, '暂无历史会话'));
    } else {
      const w = 320, h = 180, pad = 30;
      const xs = (i) => pad + i*((w-pad*2)/Math.max(1, recent.length-1));
      const ys = (v) => h - pad - (v/100)*(h-pad*2);
      const points = recent.map((r,i) => `${xs(i)},${ys(r.rate)}`).join(' ');
      const svg = `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">
        <line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="rgba(120,120,128,0.3)" stroke-width="1"/>
        <line x1="${pad}" y1="${pad}" x2="${pad}" y2="${h-pad}" stroke="rgba(120,120,128,0.3)" stroke-width="1"/>
        <polyline fill="none" stroke="var(--color-accent)" stroke-width="2.5" points="${points}"/>
        ${recent.map((r,i)=>`<circle cx="${xs(i)}" cy="${ys(r.rate)}" r="4" fill="var(--color-accent)"><title>${r.date}: ${r.rate}%</title></circle>`).join('')}
        ${recent.map((r,i)=>`<text x="${xs(i)}" y="${h-pad+16}" text-anchor="middle" font-size="10" fill="var(--color-text-secondary)">${r.date}</text>`).join('')}
      </svg>`;
      const wrap = el('div', {class:'line-chart-wrap'});
      wrap.innerHTML = svg;
      lineCard.appendChild(wrap);
    }
    charts.appendChild(lineCard);
    main.appendChild(charts);
    // per-type accuracy bars
    if (totalByType > 0) {
      const bars = el('div', {class:'per-type-bars glass-card'});
      bars.appendChild(el('h3', {style:'font-size:var(--fs-h3);font-weight:600;margin-bottom:16px'}, '各题型正确率'));
      TYPE_ORDER.forEach(t => {
        if (byType[t].total === 0) return;
        const row = el('div', {class:'pt-row'});
        const rate = Math.round((byType[t].correct/byType[t].total)*100);
        row.appendChild(el('div', {class:'pt-label'}, TYPES[t]));
        const track = el('div', {class:'pt-track'});
        const fill = el('div', {class:'pt-fill', style:'width:'+rate+'%'});
        track.appendChild(fill);
        row.appendChild(track);
        row.appendChild(el('div', {class:'pt-num'}, rate+'%'));
        bars.appendChild(row);
      });
      main.appendChild(bars);
    }
    this.mount(f);
  },

  renderSettings() {
    const f = this.tpl('tpl-settings');
    const cur = Store.state.settings?.theme || 'auto';
    f.querySelectorAll('#theme-seg .seg-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.theme === cur);
      b.addEventListener('click', () => {
        Store.updateSettings({theme: b.dataset.theme});
        f.querySelectorAll('#theme-seg .seg-btn').forEach(x => x.classList.toggle('active', x === b));
        Toast.success('主题已切换');
      });
    });
    const fsSlider = f.querySelector('#fs-slider');
    const fsVal = f.querySelector('#fs-val');
    fsSlider.value = Store.state.settings?.fsQuizStem || 22;
    fsVal.textContent = fsSlider.value;
    fsSlider.addEventListener('input', () => {
      fsVal.textContent = fsSlider.value;
      Store.updateSettings({fsQuizStem: +fsSlider.value});
    });
    // background picker
    const curBg = Store.state.settings?.bgImage || 1;
    f.querySelectorAll('.bg-thumb').forEach(b => {
      b.classList.toggle('active', +b.dataset.bg === curBg);
      b.addEventListener('click', () => {
        const bg = +b.dataset.bg;
        Store.updateSettings({bgImage: bg});
        f.querySelectorAll('.bg-thumb').forEach(x => x.classList.toggle('active', x === b));
        Toast.success('背景已切换');
      });
    });
    f.querySelector('#btn-export').addEventListener('click', () => this.exportData());
    f.querySelector('#btn-import').addEventListener('click', () => $('#import-file').click());
    f.querySelector('#import-file').addEventListener('change', (e) => this.importData(e.target.files[0]));
    f.querySelector('#btn-clear-data').addEventListener('click', () => {
      Modal.show({
        title:'清空所有数据？',
        body:'错题集、统计历史、设置、刷题进度全部会被删除，且无法恢复。',
        actions:[
          {label:'取消'},
          {label:'确认清空', kind:'danger', onClick: () => {
            ['settings','wrongQuestions','activeSession','history'].forEach(k => DataLayer.remove(k));
            Store.init(); Router.go('#/home'); Toast.success('所有数据已清空');
          }}
        ]
      });
    });
    this.mount(f);
  },

  exportData() {
    const data = {
      app: 'mac-quiz', version: 1, exportedAt: Date.now(),
      ...DataLayer.loadAll()
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `mac-quiz-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    Toast.success('数据已导出');
  },

  importData(file) {
    if (!file) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const data = JSON.parse(r.result);
        if (data.app !== 'mac-quiz') { Toast.error('文件格式不正确'); return; }
        Modal.show({
          title:'导入将覆盖当前数据',
          body:'确定要用备份文件覆盖错题集、统计与设置吗？',
          actions:[
            {label:'取消'},
            {label:'覆盖导入', kind:'primary', onClick: () => {
              ['settings','wrongQuestions','activeSession','history'].forEach(k => {
                if (data[k] !== undefined) DataLayer.set(k, data[k]);
              });
              Store.init(); Router.go('#/home'); Toast.success('导入完成');
            }}
          ]
        });
      } catch(e) { Toast.error('JSON 解析失败：'+e.message); }
    };
    r.readAsText(file);
  }
};

// =============================================================
// Keyboard - 快捷键
// =============================================================
const Keyboard = {
  init() {
    addEventListener('keydown', (e) => {
      const tag = (e.target.tagName || '').toLowerCase();
      if (tag === 'textarea' || tag === 'input') return;
      const isMac = navigator.platform.toLowerCase().includes('mac');
      const cmd = isMac ? e.metaKey : e.ctrlKey;
      if (e.key === 'Escape') {
        const mb = $('.modal-backdrop'); if (mb) mb.remove();
        return;
      }
      if (cmd && /^[1-5]$/.test(e.key)) {
        e.preventDefault();
        const routes = ['#/home','#/quiz-setup','#/wrong','#/stats','#/settings'];
        Router.go(routes[+e.key - 1]);
        return;
      }
      // 刷题快捷键
      if (location.hash.startsWith('#/quiz') && !location.hash.startsWith('#/quiz-setup')) {
        const session = Store.state.quizSession;
        if (!session) return;
        const q = session.questions[session.currentIdx];
        if (!q) return;
        const answered = session.answers[q.id];
        if (answered) {
          if (e.key === 'Enter' || e.key === 'ArrowRight') {
            const isLast = session.currentIdx === session.questions.length - 1;
            if (isLast) UI.renderResult();
            else { QuizEngine.next(session); UI.renderQuizQuestion(); }
            e.preventDefault();
          }
          return;
        }
        if ((q.type === 'single' || q.type === 'multi') && /^[1-4]$/.test(e.key)) {
          const letter = ['A','B','C','D'][+e.key-1];
          if (q.type === 'single') UI.submitAnswer(letter);
          else $$('.opt-card')[+e.key-1]?.click();
          e.preventDefault();
        }
        if (q.type === 'judge' && (e.key === 'y' || e.key === 'Y' || e.key === '1')) { UI.submitAnswer('Y'); e.preventDefault(); }
        if (q.type === 'judge' && (e.key === 'n' || e.key === 'N' || e.key === '0' || e.key === '2')) { UI.submitAnswer('N'); e.preventDefault(); }
      }
    });
  }
};

// =============================================================
// 路由注册
// =============================================================
Router.on('#/home', () => UI.renderHome());
Router.on('#/quiz-setup', () => UI.renderQuizSetup());
Router.on('#/quiz', () => UI.renderQuiz());
Router.on('#/wrong', (p) => UI.renderWrong(p));
Router.on('#/stats', () => UI.renderStats());
Router.on('#/settings', () => UI.renderSettings());

// =============================================================
// LiquidGlass - 光标跟随流光 (Apple WWDC25 风格)
// 单一委托监听, rAF 节流, 把光标在 .liquid 元素内的位置写入 --mx/--my
// =============================================================
const LiquidGlass = {
  raf: 0, lastEl: null, lastX: 0, lastY: 0,
  init() {
    document.addEventListener('pointermove', (e) => {
      const el = e.target.closest && e.target.closest('.liquid');
      this.lastEl = el; this.lastX = e.clientX; this.lastY = e.clientY;
      if (!this.raf) this.raf = requestAnimationFrame(() => this.flush());
    }, {passive:true});
    // 触摸/移动出元素时复位到中心
    document.addEventListener('pointerleave', () => { this.lastEl = null; }, {passive:true});
  },
  flush() {
    this.raf = 0;
    const el = this.lastEl;
    if (!el) return;
    const r = el.getBoundingClientRect();
    const mx = ((this.lastX - r.left) / r.width) * 100;
    const my = ((this.lastY - r.top) / r.height) * 100;
    el.style.setProperty('--mx', mx.toFixed(1) + '%');
    el.style.setProperty('--my', my.toFixed(1) + '%');
  }
};

// =============================================================
// 启动
// =============================================================
document.addEventListener('DOMContentLoaded', () => {
  Store.init();
  Router.start();
  Keyboard.init();
  LiquidGlass.init();
  matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => Store.applyTheme());

  // Traffic light buttons
  $$('.tl-dot').forEach(b => b.addEventListener('click', () => {
    const a = b.dataset.action;
    const app = $('#app');
    if (a === 'close') Toast.warn('这是网页应用，无法真的关闭 ;)');
    if (a === 'min') Toast.show('最小化只是一种象征');
    if (a === 'max') {
      app.classList.toggle('maximized');
      if (app.classList.contains('maximized')) { app.style.inset = '0'; app.style.borderRadius = '0'; }
      else { app.style.inset = ''; app.style.borderRadius = ''; }
    }
  }));

  // 主题切换按钮
  $('#btn-theme').addEventListener('click', () => {
    const cur = Store.state.settings?.theme || 'auto';
    const next = cur === 'light' ? 'dark' : cur === 'dark' ? 'auto' : 'light';
    Store.updateSettings({theme: next});
    $('#btn-theme').textContent = next === 'dark' ? '🌙' : next === 'light' ? '☀' : '⚙';
    Toast.show(`已切换为 ${next === 'auto' ? '跟随系统' : next === 'dark' ? '深色' : '浅色'}`);
  });
  $('#btn-theme').textContent = (Store.state.settings?.theme === 'dark') ? '🌙' : (Store.state.settings?.theme === 'light') ? '☀' : '⚙';

  // 防止误关
  addEventListener('beforeunload', (e) => {
    const session = Store.state.quizSession;
    if (session && session.currentIdx < session.questions.length - 1) {
      DataLayer.set('activeSession', session);
    }
  });
});
</script>
